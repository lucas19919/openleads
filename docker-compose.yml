name: openleads

# Pull a published image by setting OPENLEADS_IMAGE (e.g. in /opt/openleads/.env),
# or just `docker compose build` to build the bundled Dockerfile locally.
services:
  api:
    image: ${OPENLEADS_IMAGE:-openleads:latest}
    build: .
    restart: unless-stopped
    # api.env holds: SESSION_SECRET, SERVICE_TOKEN, WEB_ORIGIN, and (optional)
    # the AI core + mail vars: AI_BASE_URL, AI_MODEL, AI_API_KEY, AI_EMBED_MODEL,
    # SMTP_HOST/PORT/USER/PASS/FROM. See api/.env.example for the full list.
    env_file:
      - ./api.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0 # container-internal; host exposure is limited below
      PORT: "8787"
      DB_PATH: /data/leads.db
      WEB_DIST: /app/web/dist
    # Reach an Ollama running on the *host* (the on-prem AI default) from inside
    # the container via this name; set AI_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - crm-data:/data # SQLite DB survives image updates
    ports:
      - "127.0.0.1:8787:8787" # only localhost — host nginx proxies the subdomain

  # One-shot lead scraper. Not started by `up` (tools profile). Run it with:
  #   docker compose --profile tools run --rm scraper
  # Schedule it from host cron for a daily run.
  scraper:
    image: ${OPENLEADS_IMAGE:-openleads:latest}
    profiles: ["tools"]
    working_dir: /app/scraper
    env_file:
      - ./scraper.env # ANTHROPIC_API_KEY, CRM_SERVICE_TOKEN, MIN_SCORE
    environment:
      CRM_API_URL: http://api:8787
    command: ["npm", "start"]

volumes:
  crm-data:
