# nginx vhost for crm.example.com — reverse-proxies to the local CRM API,
# which serves both /api and the built internal web app.
#
# Install:
#   sudo cp crm/deploy/nginx-crm.conf /etc/nginx/sites-available/crm.example.com
#   sudo ln -s /etc/nginx/sites-available/crm.example.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.example.com   # adds TLS + HTTP->HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name crm.example.com;

    # Keep the internal tool out of search engines.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
